<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Privacy Screen — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0d1117"/>
    <path d="M50 24l18 7v13c0 11-7.5 19.5-18 23-10.5-3.5-18-12-18-23V31z" fill="none" stroke="#37d39a" stroke-width="4" stroke-linejoin="round"/>
    <path d="M42 50l6 6 12-13" fill="none" stroke="#37d39a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="kit.jsx"></script>
<script type="text/babel" src="sample.jsx"></script>
<script type="text/babel" src="legend.jsx"></script>
<script type="text/babel" src="console.jsx"></script>
<script type="text/babel" src="flow.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>
<script type="text/babel" src="states.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const DARK = '#0d1117', LIGHT = '#f4f6f9';
const W = 1280, H = 800;

// Return a DCArtboard ELEMENT directly (not a component wrapper) so DCSection's
// type-based child walk finds it.
const board = (id, label, Comp, mode, w = W, h = H) => (
  <DCArtboard id={id} label={label} width={w} height={h} style={{ background: mode === 'dark' ? DARK : LIGHT }}>
    <Comp mode={mode} />
  </DCArtboard>
);

function App() {
  return (
    <DesignCanvas>
      <DCSection id="system" title="Foundation" subtitle="One accessible system · three directions · dark + light">
        {board('legend', 'Design system & accessibility', window.SystemLegend, 'dark', 1280, 600)}
      </DCSection>

      <DCSection id="ws-dark" title="Workspace — the anchor (dark)" subtitle="The compose → scrub → send flow, three layout philosophies side by side">
        {board('c-d', '1 · Console — dense power-tool', window.ConsoleWorkspace, 'dark')}
        {board('f-d', '2 · Flow — guided rail (recommended)', window.FlowWorkspace, 'dark')}
        {board('h-d', '3 · Chat — conversation-native', window.ChatWorkspace, 'dark')}
      </DCSection>

      <DCSection id="ws-light" title="Workspace — light mode" subtitle="Same three, light theme · both pass AA contrast">
        {board('c-l', '1 · Console — light', window.ConsoleWorkspace, 'light')}
        {board('f-l', '2 · Flow — light', window.FlowWorkspace, 'light')}
        {board('h-l', '3 · Chat — light', window.ChatWorkspace, 'light')}
      </DCSection>

      <DCSection id="review" title="Review & triage" subtitle="Confirm / allow / ignore — heuristic + local-judge findings, in the recommended shell">
        {board('rev-d', 'Review — dark', window.ReviewScreen, 'dark')}
        {board('rev-l', 'Review — light', window.ReviewScreen, 'light')}
      </DCSection>

      <DCSection id="vocab" title="Vocabulary — token map" subtitle="Browse, reveal, and forget every locally-stored token">
        {board('voc-d', 'Vocabulary — dark', window.VocabScreen, 'dark')}
        {board('voc-l', 'Vocabulary — light', window.VocabScreen, 'light')}
      </DCSection>

      <DCSection id="settings" title="Settings" subtitle="Modes · local LLM judge · updates · customer vocabulary · data">
        {board('set-d', 'Settings — dark', window.SettingsScreen, 'dark')}
        {board('set-l', 'Settings — light', window.SettingsScreen, 'light')}
      </DCSection>

      <DCSection id="onboarding" title="Onboarding — first run" subtitle="Connect Claude · choose a mode · walk the safety checklist">
        {board('onb-d', 'First run — dark', window.OnboardingScreen, 'dark')}
        {board('onb-l', 'First run — light', window.OnboardingScreen, 'light')}
      </DCSection>

      <DCSection id="states" title="Empty & error states" subtitle="The moments that build (or break) trust">
        {board('st-empty', 'Empty / idle', window.StateEmpty, 'dark', 640, 440)}
        {board('st-cred', 'Credential blocked', window.StateCredential, 'dark', 640, 440)}
        {board('st-noclaude', 'Claude not found', window.StateNoClaude, 'dark', 640, 440)}
        {board('st-offline', 'Server offline', window.StateOffline, 'dark', 640, 440)}
      </DCSection>

      <DCSection id="pwa" title="PWA — install to phone" subtitle="Roadmap: same system, responsive, offline-capable">
        {board('pwa-d', 'Mobile — dark', window.PWAMobile, 'dark', 390, 780)}
        {board('pwa-l', 'Mobile — light', window.PWAMobile, 'light', 390, 780)}
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
