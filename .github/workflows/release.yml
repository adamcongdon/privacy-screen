name: release

# Auto-deploy beta builds on pushes to the `beta` branch.
#   (PRs landing on `beta` — typically from your primary ac-build branch — trigger beta.)
# Generate full (stable) releases on pushes to main (PRs from `beta` to `main` only).
#
# Skip a release: include `[skip release]` in the head commit message (for squash
# merges, the PR title or body) so a maintenance merge to main does not cut a
# stable release. See the `build` job's `if:` below.

on:
  push:
    branches: [beta, main]

# Serialize releases per branch so two quick pushes can't both compute the same
# next tag and race to publish (issue #107). cancel-in-progress is false: a queued
# run waits for the in-flight publish to finish rather than cancelling it midway
# (a cancelled run could leave a release created but assets half-uploaded).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create releases + upload assets; push updated manifest back to the branch
  pull-requests: read

jobs:
  # Always run the normal test/lint before producing a release artifact.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (tsc --noEmit)
        run: bun lint

      - name: Test
        run: bun test

  build:
    name: build (${{ github.ref_name }})
    needs: test
    runs-on: ubuntu-latest
    # Only the build portion is conditioned on direct pushes; actual release creation
    # (which needs signed artifacts) runs in the create-release job with its own guard.
    # PRs do not trigger release builds.
    #
    # `[skip release]` escape hatch: maintenance merges to main (CI/workflow/docs/
    # dep housekeeping) shouldn't cut a user-facing stable release. Put `[skip
    # release]` anywhere in the head commit message (for squash merges, the PR
    # title or body) to skip build → packaging → create-release. The version is
    # tag-derived, so skipping a push simply doesn't advance the release tag.
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/main') &&
      !contains(github.event.head_commit.message, '[skip release]')
    # Expose the single, tag-based version (from scripts/compute-version.ts) so the
    # installer packaging jobs consume the SAME version the binaries were baked with,
    # instead of recomputing it from package.json + run_number (issue #106).
    outputs:
      channel: ${{ steps.vars.outputs.channel }}
      qual_version: ${{ steps.vars.outputs.qual_version }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need full history for sha if we embed it; also for the later git commit of manifest.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute version + channel + tag info
        id: vars
        run: |
          BRANCH="${{ github.ref_name }}"
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [ "$BRANCH" = "beta" ]; then
            CHANNEL="beta"
            MANIFEST_NAME="release-manifest-beta.json"
            PRERELEASE_FLAG="--prerelease"
          else
            CHANNEL="stable"
            MANIFEST_NAME="release-manifest.json"
            PRERELEASE_FLAG=""
          fi

          # Source of truth: git tags. package.json is treated as a floor only.
          # See scripts/compute-version.ts for the increment rules.
          TAG=$(bun scripts/compute-version.ts "$CHANNEL")
          QUAL_VERSION="${TAG#v}"
          BASE_VERSION="${QUAL_VERSION%-beta.*}"

          if [ "$CHANNEL" = "beta" ]; then
            RELEASE_TITLE="Beta ${QUAL_VERSION} (${SHORT_SHA})"
          else
            RELEASE_TITLE="v${QUAL_VERSION}"
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "qual_version=$QUAL_VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "manifest_name=$MANIFEST_NAME" >> $GITHUB_OUTPUT
          echo "prerelease_flag=$PRERELEASE_FLAG" >> $GITHUB_OUTPUT
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          echo "channel=$CHANNEL version=$QUAL_VERSION tag=$TAG manifest=$MANIFEST_NAME"

      - name: Stamp package.json with the computed version (ephemeral, for this build only)
        # build-release.ts reads pkg.version verbatim to bake into the binary +
        # manifest. We never commit this change; create-release restores it.
        run: |
          QUAL="${{ steps.vars.outputs.qual_version }}"
          echo "Temporarily setting package.json version to ${QUAL} for binary + manifest"
          jq --arg v "$QUAL" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build release artifacts (web + compiled binaries + manifest)
        run: |
          CHANNEL="${{ steps.vars.outputs.channel }}"
          bun scripts/build-release.ts --channel "$CHANNEL"

      - name: Sign Windows binary (osslsigncode + timestamp; gated by RUN_CODE_SIGNING)
        # Requires repo secrets:
        #   WINDOWS_CERT_P12      (base64-encoded PKCS#12 / .p12 of your code signing cert; EV preferred)
        #   WINDOWS_CERT_PASSWORD (password for the p12)
        # And to activate the path:
        #   Settings → Secrets and variables → Actions → Variables tab
        #   Add variable: RUN_CODE_SIGNING = true
        #
        # When enabled, the built win32 exe is signed in-place before VT scan and before
        # artifacts are uploaded for the (optional) macOS signing job and the create-release job.
        # The sha256 recorded in the final release manifest will be that of the signed binary.
        if: ${{ vars.RUN_CODE_SIGNING == 'true' }}
        env:
          WINDOWS_CERT_P12: ${{ secrets.WINDOWS_CERT_P12 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_CERT_P12" ] || [ -z "$WINDOWS_CERT_PASSWORD" ]; then
            echo "::error::RUN_CODE_SIGNING=true but one or more WINDOWS_CERT_* secrets are missing"
            exit 1
          fi
          echo "Installing osslsigncode and signing Windows binary..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq osslsigncode
          echo "$WINDOWS_CERT_P12" | base64 -d > /tmp/win-cert.p12
          IN="dist/privacy-screen-win32-x64.exe"
          OUT="dist/privacy-screen-win32-x64.exe.signed"
          osslsigncode sign \
            -pkcs12 /tmp/win-cert.p12 \
            -pass "$WINDOWS_CERT_PASSWORD" \
            -n "privacy-screen" \
            -i "https://github.com/adamcongdon/privacy-screen" \
            -ts http://timestamp.acs.microsoft.com \
            -in "$IN" \
            -out "$OUT"
          mv "$OUT" "$IN"
          echo "Windows binary signed successfully."
          rm -f /tmp/win-cert.p12

      - name: VirusTotal scan of release binaries
        # Requires the VT_API_KEY secret (VirusTotal free API key has generous limits).
        # Scans the final compiled binaries for reputation/malware before attaching
        # them to the GitHub release. Highly recommended for any project shipping executables.
        #
        # IMPORTANT: We use a repository *variable* (not a secret) to control whether
        # this step runs. You cannot reliably use `secrets.XXX != ''` in `if:` conditions
        # (GitHub redacts secrets in expressions for security reasons, so the condition
        # almost always evaluates to false/skip even when the secret exists).
        #
        # To enable:
        #   1. Settings → Secrets and variables → Actions → Variables tab
        #   2. Add variable: RUN_VIRUSTOTAL_SCAN = true
        if: ${{ vars.RUN_VIRUSTOTAL_SCAN == 'true' }}
        uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5.0.0
        with:
          files: |
            dist/privacy-screen-darwin-arm64
            dist/privacy-screen-darwin-x64
            dist/privacy-screen-win32-x64.exe
          vt_api_key: ${{ secrets.VT_API_KEY }}
          # Do not monitor for future changes (we control the build).
          vt_monitor: false

      - name: Upload built binaries (for macOS signing job and/or create-release assembly)
        # These are the "build-*" artifacts. When code signing is enabled:
        # - Windows binary here has already been signed (see step above).
        # - Darwin binaries are unsigned; the sign-macos job will produce final-darwin-* overlays.
        # When RUN_CODE_SIGNING is not enabled, these artifacts (with unsigned darwins) are used directly.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-binaries
          path: |
            dist/privacy-screen-darwin-arm64
            dist/privacy-screen-darwin-x64
            dist/privacy-screen-win32-x64.exe

      - name: Build artifacts ready
        run: |
          echo "✅ Build complete for ${{ steps.vars.outputs.branch }}"
          echo "Channel: ${{ steps.vars.outputs.channel }}"
          echo "Version (baked): ${{ steps.vars.outputs.qual_version }}"
          echo "Artifacts uploaded for downstream signing (if enabled) and release creation."
          ls -l dist/ || true

  # ---------------------------------------------------------------------------
  # Windows double-click installer (Inno Setup). Runs on a Windows runner so we
  # can use ISCC. Packages the (already-signed-when-enabled) win32 binary from
  # the build job into dist/privacy-screen-setup-win32-x64.exe. Best-effort:
  # create-release attaches the installer only if this job succeeds.
  # ---------------------------------------------------------------------------
  package-windows:
    name: package-windows
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download built binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-binaries
          path: dist/

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: bash
        # Version comes from the build job's single tag-based computation (issue #106),
        # so the Inno AppVersion matches the release tag and the baked binary version.
        env:
          APP_VERSION: ${{ needs.build.outputs.qual_version }}
        run: |
          if [ -z "$APP_VERSION" ]; then
            echo "::error::needs.build.outputs.qual_version is empty — cannot package installer"
            exit 1
          fi
          ISCC="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          # MSYS_NO_PATHCONV stops Git Bash from rewriting the /D define into a
          # Windows path, which would make ISCC see it as a second script file
          # ("You may not specify more than one script filename").
          MSYS_NO_PATHCONV=1 "$ISCC" "/DMyAppVersion=${APP_VERSION}" installers/windows/privacy-screen.iss
          ls -l dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-windows
          path: dist/privacy-screen-setup-win32-x64.exe

  # ---------------------------------------------------------------------------
  # macOS .app + .dmg installers (arm64 + x64). Runs on a macOS runner for
  # hdiutil. Packages the darwin binaries from the build job. Best-effort.
  # NOTE: this packages the build-job darwins; when RUN_CODE_SIGNING is enabled
  # the standalone signed+notarized raw binaries are still released separately.
  # ---------------------------------------------------------------------------
  package-macos:
    name: package-macos
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download built binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-binaries
          path: dist/

      - name: Build .app + .dmg (arm64 + x64)
        # Version comes from the build job's single tag-based computation (issue #106),
        # so dmg filename / CFBundleVersion / uninstall name match the release tag.
        env:
          APP_VERSION: ${{ needs.build.outputs.qual_version }}
        run: |
          if [ -z "$APP_VERSION" ]; then
            echo "::error::needs.build.outputs.qual_version is empty — cannot package installer"
            exit 1
          fi
          chmod +x dist/privacy-screen-darwin-arm64 dist/privacy-screen-darwin-x64 || true
          bash installers/macos/package-macos.sh \
            --binary dist/privacy-screen-darwin-arm64 \
            --version "$APP_VERSION" --arch arm64 --outdir dist
          bash installers/macos/package-macos.sh \
            --binary dist/privacy-screen-darwin-x64 \
            --version "$APP_VERSION" --arch x64 --outdir dist
          ls -l dist/*.dmg

      - name: Upload dmg artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-macos
          path: dist/*.dmg

  # ---------------------------------------------------------------------------
  # macOS code signing + notarization (only when RUN_CODE_SIGNING=true).
  # Produces final-darwin-* artifacts containing the Developer ID signed +
  # Apple-notarized + stapled binaries. These overlay the build-binaries darwins
  # in the create-release job.
  # Requires Apple Developer ID Application cert (p12) + App Store Connect API key.
  # ---------------------------------------------------------------------------
  sign-macos:
    name: sign-macos
    needs: build
    runs-on: macos-latest
    if: ${{ vars.RUN_CODE_SIGNING == 'true' }}
    steps:
      - name: Download built darwin binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-binaries
          path: dist/

      - name: Import Apple Developer ID cert into temporary keychain
        env:
          CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          # Use a unique per-run password for the transient keychain.
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-kc
        run: |
          set -euo pipefail
          echo "Creating temporary keychain for signing..."
          security create-keychain -p "$KEYCHAIN_PASSWORD" signing.keychain
          security default-keychain -s signing.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" signing.keychain
          # Allow codesign to use the key without UI prompts in CI.
          security set-keychain-settings -t 3600 -u signing.keychain

          echo "$CERT_P12" | base64 -d > /tmp/apple-cert.p12
          security import /tmp/apple-cert.p12 \
            -k signing.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild || true

          # Grant the codesign tool access to the private key.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" signing.keychain || true

          echo "Cert imported. Identities:"
          security find-identity -v -p codesigning signing.keychain

      - name: Codesign darwin binaries (hardened runtime + secure timestamp)
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          IDENTITY="${APPLE_SIGN_IDENTITY:-Developer ID Application}"
          for f in dist/privacy-screen-darwin-*; do
            echo "→ codesign $f"
            codesign --force --options runtime --sign "$IDENTITY" --timestamp "$f"
            echo "→ verify $f"
            codesign --verify --deep --strict --verbose=2 "$f"
          done

      - name: Notarize + staple (App Store Connect API key)
        # Modern notarization path (no Apple ID password). Provide:
        #   APPLE_API_KEY      = base64 of the AuthKey_*.p8 file downloaded from App Store Connect
        #   APPLE_API_KEY_ID   = e.g. 2X9R4HXF34
        #   APPLE_API_ISSUER   = Issuer UUID (shown on the key page in ASC)
        # The p8 is written to the conventional location notarytool looks for.
        env:
          API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "$API_KEY_B64" ] || [ -z "$API_KEY_ID" ] || [ -z "$API_ISSUER" ]; then
            echo "::error::APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER required when RUN_CODE_SIGNING=true"
            exit 1
          fi

          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          for f in dist/privacy-screen-darwin-*; do
            echo "→ Preparing $f for notarization (zip for submission)"
            ZIP="${f}.zip"
            ditto -c -k --keepParent "$f" "$ZIP"

            echo "→ notarytool submit $ZIP (waiting for result)"
            xcrun notarytool submit "$ZIP" \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER" \
              --key ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
              --wait

            echo "→ stapler staple $f"
            xcrun stapler staple "$f" || echo "stapler returned non-zero (continuing; some CLIs are noisy for plain Mach-O)"

            echo "→ post-notarize verify"
            codesign --verify --deep --strict --verbose=2 "$f"
            # spctl is best-effort for CLI tools; do not fail the build on it.
            spctl --assess --type execute --verbose "$f" || true
          done

      - name: Upload final (signed + notarized + stapled) darwin binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: final-darwin-binaries
          path: |
            dist/privacy-screen-darwin-arm64
            dist/privacy-screen-darwin-x64

  # ---------------------------------------------------------------------------
  # Create the GitHub Release (and commit the release-manifest-*.json).
  # This job assembles the final (signed when enabled) binaries via artifacts,
  # (re)generates the manifest with correct hashes using --manifest-only,
  # creates/updates the release, and pushes the manifest to the branch.
  # It runs for both beta and stable pushes (same guard as the old combined job).
  # ---------------------------------------------------------------------------
  create-release:
    name: create-release (${{ github.ref_name }})
    needs: [test, build, sign-macos, package-windows, package-macos]
    runs-on: ubuntu-latest
    # Only on direct pushes to the protected branches (post-merge). PRs never release.
    # The "always()" + result checks let this proceed when sign-macos was skipped
    # (i.e. when RUN_CODE_SIGNING != 'true'), while still requiring build to have
    # succeeded — we consume needs.build.outputs.* below, so a failed build must
    # fail-fast here rather than running with empty version outputs.
    if: |
      always() &&
      (github.event_name == 'push' && (github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/main')) &&
      needs.build.result == 'success' &&
      (needs.sign-macos.result == 'success' || needs.sign-macos.result == 'skipped')
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies (for manifest-only script run)
        run: bun install --frozen-lockfile

      - name: Resolve version + channel + tag info (from build job — single source)
        id: vars
        # Consume the build job's tag-based version verbatim instead of recomputing
        # via compute-version.ts. Recomputing keys off live `git fetch --tags`, so a
        # tag landing between the build and create-release jobs would desync the
        # release tag/manifest from the installers built earlier in this run
        # (issues #106/#107). The build job is the single source of truth.
        env:
          BRANCH: ${{ github.ref_name }}
          CHANNEL: ${{ needs.build.outputs.channel }}
          QUAL_VERSION: ${{ needs.build.outputs.qual_version }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "$TAG" ] || [ -z "$QUAL_VERSION" ] || [ -z "$CHANNEL" ]; then
            echo "::error::build job did not provide version outputs (tag/qual_version/channel)"
            exit 1
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          BASE_VERSION="${QUAL_VERSION%-beta.*}"

          if [ "$CHANNEL" = "beta" ]; then
            MANIFEST_NAME="release-manifest-beta.json"
            PRERELEASE_FLAG="--prerelease"
            RELEASE_TITLE="Beta ${QUAL_VERSION} (${SHORT_SHA})"
          else
            MANIFEST_NAME="release-manifest.json"
            PRERELEASE_FLAG=""
            RELEASE_TITLE="v${QUAL_VERSION}"
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "qual_version=$QUAL_VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "manifest_name=$MANIFEST_NAME" >> $GITHUB_OUTPUT
          echo "prerelease_flag=$PRERELEASE_FLAG" >> $GITHUB_OUTPUT
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          echo "channel=$CHANNEL version=$QUAL_VERSION tag=$TAG manifest=$MANIFEST_NAME"

      - name: Stamp package.json with the computed version (ephemeral, for manifest generation)
        # build-release.ts --manifest-only reads pkg.version verbatim to write
        # into the manifest. We never commit this change; the next step restores it.
        run: |
          QUAL="${{ steps.vars.outputs.qual_version }}"
          echo "Temporarily setting package.json version to ${QUAL} for manifest"
          jq --arg v "$QUAL" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Download built binaries (base layer)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-binaries
          path: dist/

      - name: Overlay final signed+notarized darwin binaries (when code signing enabled)
        if: ${{ vars.RUN_CODE_SIGNING == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: final-darwin-binaries
          path: dist/

      - name: Download Windows installer (best-effort)
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: installer-windows
          path: dist/

      - name: Download macOS installers (best-effort)
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: installer-macos
          path: dist/

      - name: Verify we have the three platform binaries in dist/
        run: |
          for name in privacy-screen-darwin-arm64 privacy-screen-darwin-x64 privacy-screen-win32-x64.exe; do
            if [ ! -f "dist/$name" ]; then
              echo "::error::Missing expected dist/$name"
              ls -l dist/ || true
              exit 1
            fi
          done
          echo "All three binaries present:"
          ls -l dist/privacy-screen-*

      - name: (Re)generate release manifest from final (signed) binaries
        # Uses the (possibly beta-qualified) package.json version for the manifest
        # and the asset URLs inside it. Hashes are taken from whatever is currently
        # in dist/ (the signed versions when code signing ran).
        run: |
          CHANNEL="${{ steps.vars.outputs.channel }}"
          bun scripts/build-release.ts --manifest-only --channel "$CHANNEL"

      - name: Prepare manifest file for GitHub release assets
        run: |
          MANIFEST="${{ steps.vars.outputs.manifest_name }}"
          # On the stable channel manifest_name IS release-manifest.json, so the
          # source and destination are the same file — copying it onto itself
          # errors under `bash -e`. Only copy when the channel-qualified name differs.
          if [ "dist/$MANIFEST" != "dist/release-manifest.json" ]; then
            cp dist/release-manifest.json "dist/$MANIFEST"
          fi

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          TITLE="${{ steps.vars.outputs.release_title }}"
          PRERELEASE="${{ steps.vars.outputs.prerelease_flag }}"
          MANIFEST="${{ steps.vars.outputs.manifest_name }}"

          # Never overwrite an already-published release. Released artifacts are
          # sha-pinned by the update manifest, so mutating them in place would
          # silently break the update contract. If the tag already exists, fail
          # loudly — a re-run must not clobber published binaries (issue #107).
          # To re-cut a botched release, delete the release + tag, then re-run.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Refusing to overwrite published, sha-pinned artifacts. Delete the release and tag to re-cut."
            exit 1
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            $PRERELEASE \
            --generate-notes \
            dist/privacy-screen-darwin-arm64 \
            dist/privacy-screen-darwin-x64 \
            dist/privacy-screen-win32-x64.exe \
            "dist/${MANIFEST}"

          echo "Release $TAG created/updated with assets."

      - name: Attach desktop installers to the release (best-effort)
        # Installers are first-install convenience artifacts. If their packaging
        # jobs failed or were skipped, the core release (raw binaries + manifest)
        # is unaffected — we just don't attach installers this run.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          shopt -s nullglob
          ASSETS=( dist/privacy-screen-setup-win32-x64.exe dist/*.dmg )
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No installer artifacts present; skipping installer attach."
            exit 0
          fi
          echo "Attaching installers: ${ASSETS[*]}"
          # No --clobber: the "Create GitHub Release" step above guarantees this is a
          # freshly created tag (it fails loudly if the release already exists), so
          # installers attach exactly once. Refusing to overwrite keeps published
          # release assets immutable, consistent with the no-clobber guard (issue #107).
          gh release upload "$TAG" "${ASSETS[@]}"

      - name: Restore clean package.json (do not commit the beta-qualified version)
        if: steps.vars.outputs.channel == 'beta'
        run: |
          git checkout -- package.json || true

      - name: Update release manifest in repo (for raw URL consumption by the app)
        # Beta only. The stable app reads its manifest from the latest GitHub
        # Release asset (releases/latest/download/release-manifest.json — see
        # src/config.ts UPDATE_CANONICAL_URLS), so stable does NOT commit the
        # manifest back to the protected main branch. Beta reads from the beta
        # branch file, and the bot can push there.
        if: steps.vars.outputs.channel == 'beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.vars.outputs.branch }}"
          MANIFEST_NAME="${{ steps.vars.outputs.manifest_name }}"
          TAG="${{ steps.vars.outputs.tag }}"

          echo "Updating ${MANIFEST_NAME} on ${BRANCH} from dist/release-manifest.json"

          cp dist/release-manifest.json "./${MANIFEST_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${MANIFEST_NAME}"
          if git commit -m "chore(release): update ${MANIFEST_NAME} for ${TAG} [skip ci]"; then
            git push origin "HEAD:${BRANCH}"
            echo "Pushed updated ${MANIFEST_NAME} to ${BRANCH}"
          else
            echo "No changes to ${MANIFEST_NAME} (already up to date or identical)"
          fi

      - name: Summary
        run: |
          echo "✅ create-release complete for ${{ steps.vars.outputs.branch }}"
          echo "Channel: ${{ steps.vars.outputs.channel }}"
          echo "Version (baked): ${{ steps.vars.outputs.qual_version }}"
          echo "Tag: ${{ steps.vars.outputs.tag }}"
          echo "Manifest committed as: ${{ steps.vars.outputs.manifest_name }}"
          echo "Code signing: ${{ vars.RUN_CODE_SIGNING == 'true' && 'enabled (binaries are signed+notarized where applicable)' || 'disabled (binaries are unsigned)' }}"
