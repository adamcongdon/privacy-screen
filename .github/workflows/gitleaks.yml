name: gitleaks

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # gitleaks needs full history to scan every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Required for PR scans (action fetches commit list via GitHub API).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Org/private-repo users can wire a license here later:
          #   GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml
