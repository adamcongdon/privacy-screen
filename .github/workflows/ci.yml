name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned: local dev runs on 1.3.8 and our test runner setup depends on
          # behavior that regressed in 1.3.14 (hook subprocess stdin handling).
          # Bump intentionally + re-test the hook suite when ready to move.
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (tsc --noEmit)
        run: bun lint

      - name: Test
        run: bun test
